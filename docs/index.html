<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IAnus — Gestor de Horarios Universitarios</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.6.1/reveal.min.css"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { background: #111e3a; }

    .reveal { background: #111e3a; }
    .reveal .slides { width: 100% !important; }

    /* Cada sección ocupa toda la pantalla */
    .reveal .slides section {
      padding: 0 !important;
      margin: 0 !important;
      width: 100% !important;
      height: 100% !important;
      display: flex !important;
      align-items: center;
      justify-content: center;
      background: #111e3a;
    }

    .reveal .slides section img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    /* Controles */
    .reveal .controls { color: #e8a020; }
    .reveal .progress  { color: #e8a020; height: 4px; }

    /* Número de slide */
    .reveal .slide-number {
      background: rgba(17,30,58,0.75);
      color: #e8a020;
      font-size: 14px;
      padding: 4px 10px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
<div class="reveal">
  <div class="slides">
    <section><img src="img/slide_01.jpg" alt="Slide 1"/></section>
    <section><img src="img/slide_02.jpg" alt="Slide 2"/></section>
    <section><img src="img/slide_03.jpg" alt="Slide 3"/></section>
    <section><img src="img/slide_04.jpg" alt="Slide 4"/></section>
    <section><img src="img/slide_05.jpg" alt="Slide 5"/></section>
    <section><img src="img/slide_06.jpg" alt="Slide 6"/></section>
    <section><img src="img/slide_07.jpg" alt="Slide 7"/></section>
    <section><img src="img/slide_08.jpg" alt="Slide 8"/></section>
    <section><img src="img/slide_09.jpg" alt="Slide 9"/></section>
    <section><img src="img/slide_10.jpg" alt="Slide 10"/></section>
    <section><img src="img/slide_11.jpg" alt="Slide 11"/></section>
    <section><img src="img/slide_12.jpg" alt="Slide 12"/></section>
    <section><img src="img/slide_13.jpg" alt="Slide 13"/></section>
    <section><img src="img/slide_14.jpg" alt="Slide 14"/></section>
    <section><img src="img/slide_15.jpg" alt="Slide 15"/></section>
    <section><img src="img/slide_16.jpg" alt="Slide 16"/></section>
    <section><img src="img/slide_17.jpg" alt="Slide 17"/></section>
    <section><img src="img/slide_18.jpg" alt="Slide 18"/></section>
    <section><img src="img/slide_19.jpg" alt="Slide 19"/></section>
    <section><img src="img/slide_20.jpg" alt="Slide 20"/></section>
    <section><img src="img/slide_21.jpg" alt="Slide 21"/></section>
    <section><img src="img/slide_22.jpg" alt="Slide 22"/></section>
    <section><img src="img/slide_23.jpg" alt="Slide 23"/></section>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.6.1/reveal.min.js"></script>
<script>
  Reveal.initialize({
    hash: true,
    slideNumber: 'c/t',
    controls: true,
    progress: true,
    center: true,
    transition: 'slide',
    transitionSpeed: 'fast',
    width: '100%',
    height: '100%',
    margin: 0,
    minScale: 0.2,
    maxScale: 2.0,
    keyboard: true,
    overview: true,
    touch: true,
  });
</script>
</body>
</html>
